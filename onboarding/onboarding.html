<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome to CleanTab</title>
  <link rel="stylesheet" href="onboarding.css" />
</head>
<body>
  <div class="container">

    <header class="header">
      <div class="logo">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" fill="#FF6B35" opacity="0.12"/>
          <path d="M12 6V12L16 14" stroke="#FF6B35" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="logo-text"><span class="accent">Clean</span>Tab</span>
      </div>
    </header>

    <main class="main">
      <p class="headline">You installed CleanTab.</p>

      <p class="body-text">
        It flags pages that pull you off-track and quietly tracks
        your clean browsing time each day.
      </p>

      <p class="privacy-note">Nothing leaves your device.</p>

      <div class="divider"></div>

      <p class="question">How much do you use your laptop on a normal day?</p>

      <div class="chips" id="chips">
        <button class="chip" data-hours="1.5">1–2 hrs</button>
        <button class="chip" data-hours="3.5">3–4 hrs</button>
        <button class="chip" data-hours="5.5">5–6 hrs</button>
        <button class="chip" data-hours="7.5">7–8 hrs</button>
        <button class="chip" data-hours="9">8+ hrs</button>
      </div>

      <button class="done-btn" id="doneBtn" disabled>Done</button>
    </main>

  </div>
  <script src="onboarding.js"></script>
</body>
</html>
