<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CleanTab — Setup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="onboarding.css"/>
</head>
<body>
<div class="page">

  <nav class="topbar">
    <div class="wordmark"><span class="accent">Clean</span>Tab</div>
  </nav>

  <main class="main">
    <div class="hero">
      <div class="step-chip">Setup</div>
      <h1 class="headline">One question<br/>before we start.</h1>
      <p class="sub">This sets your daily focus goal. You can always adjust later.</p>
    </div>

    <div class="question-block">
      <p class="question">How many hours do you typically use your laptop on a normal day?</p>

      <div class="chips" id="chips">
        <button class="chip" data-hours="1.5">1–2 hrs</button>
        <button class="chip" data-hours="3.5">3–4 hrs</button>
        <button class="chip" data-hours="5.5">5–6 hrs</button>
        <button class="chip" data-hours="7.5">7–8 hrs</button>
        <button class="chip" data-hours="9">8+ hrs</button>
      </div>

      <div class="goal-preview" id="goalPreview" style="opacity:0">
        <span class="goal-label">Your daily ring goal</span>
        <span class="goal-val" id="goalVal">—</span>
        <span class="goal-unit">min of clean browsing</span>
      </div>
    </div>

    <div class="footer-row">
      <p class="privacy">Nothing leaves your device.</p>
      <button class="done-btn" id="doneBtn" disabled>Get started →</button>
    </div>
  </main>

</div>
<script src="onboarding.js"></script>
</body>
</html>
