<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CleanTab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="redirect.css"/>
</head>
<body>

  <!-- Breathing overlay -->
  <div class="breath-overlay" id="breathOverlay">
    <div class="breath-orb" id="breathOrb"></div>
    <p class="breath-word" id="breathWord">Breathe in</p>
    <button class="breath-skip" id="breathSkip">Skip</button>
  </div>

  <div class="page">

    <nav class="topbar">
      <div class="wordmark"><span class="wm-accent">Clean</span>Tab</div>
    </nav>

    <main class="main">
      <div class="copy">
        <h1 class="pause">Pause.</h1>
        <p class="reason" id="reason-text">This page was flagged.</p>
      </div>

      <div class="rule"></div>

      <div class="reflect">
        <!-- First-time note (shown once) -->
        <p class="first-note" id="firstTimeNote" style="display:none">
          Pick what fits — only you ever see this.
        </p>

        <p class="reflect-q">What's actually going on right now?</p>

        <div class="chips" id="chips">
          <button class="chip" data-chip="bored">Bored</button>
          <button class="chip" data-chip="stressed">Stressed</button>
          <button class="chip" data-chip="habit">Habit</button>
          <button class="chip" data-chip="avoiding">Avoiding something</button>
          <button class="chip" data-chip="lonely">Lonely</button>
          <button class="chip" data-chip="tired">Tired</button>
        </div>

        <div class="logged" id="chipLogged" style="display:none">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M20 6L9 17l-5-5"/>
          </svg>
          <span id="loggedText">Logged.</span>
        </div>

        <div class="nudge-card" id="nudgeCard" style="display:none">
          <p class="nudge-text" id="nudgeText"></p>
          <button class="nudge-breathe" id="nudgeBreathe" style="display:none">Take a beat →</button>
        </div>
      </div>

      <div class="rule"></div>

      <div class="secondary">
        <button class="sec-btn" id="breatheBtn">Take a beat</button>
        <span class="sec-sep">·</span>
        <button class="sec-btn appeal" id="appeal-btn">This was wrongly flagged</button>
      </div>

      <div class="appeal-result" id="appeal-status"></div>

    </main>
  </div>

  <script src="redirect.js"></script>
</body>
</html>
