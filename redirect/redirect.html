<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CleanTab — Pause</title>
  <link rel="stylesheet" href="redirect.css" />
</head>
<body>

  <!-- Breathing overlay (Take a beat) -->
  <div class="breathing-overlay" id="breathingOverlay">
    <div class="breathing-circle" id="breathingCircle"></div>
    <p class="breathing-label" id="breathingLabel">Breathe in</p>
    <button class="breathing-skip" id="breathingSkip">Skip</button>
  </div>

  <div class="page">

    <header class="page-header">
      <div class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" fill="#FF6B35" opacity="0.12"/>
          <path d="M12 6V12L16 14" stroke="#FF6B35" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span><span class="accent">Clean</span>Tab</span>
      </div>
    </header>

    <main class="main">

      <div class="pause-block">
        <h1 class="pause-heading">Pause.</h1>
        <p class="reason-text" id="reason-text">This page was flagged.</p>
      </div>

      <div class="divider"></div>

      <!-- Shown only on first ever redirect -->
      <p class="first-time-note" id="firstTimeNote" style="display:none;">
        First time here — pick what fits. Only you ever see this.
      </p>

      <div class="reflection-block">
        <p class="reflection-question">What's actually going on right now?</p>

        <div class="chips" id="chips">
          <button class="chip" data-chip="bored">Bored</button>
          <button class="chip" data-chip="stressed">Stressed</button>
          <button class="chip" data-chip="habit">Habit</button>
          <button class="chip" data-chip="avoiding">Avoiding something</button>
          <button class="chip" data-chip="lonely">Lonely</button>
          <button class="chip" data-chip="tired">Tired</button>
        </div>

        <div class="chip-confirm" id="chipConfirm" style="display:none;">
          <p class="confirm-text" id="confirmText">Logged.</p>
          <p class="confirm-count" id="confirmCount"></p>
        </div>
      </div>

      <div class="divider"></div>

      <div class="secondary-actions">
        <button class="secondary-btn" id="breatheBtn">Take a beat</button>
        <button class="secondary-btn appeal" id="appeal-btn">This was wrongly flagged</button>
      </div>

      <div class="appeal-status" id="appeal-status"></div>

    </main>

  </div>

  <script src="redirect.js"></script>
</body>
</html>
